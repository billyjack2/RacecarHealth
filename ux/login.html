<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · RaceCarHealth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/app.css" />
  <style>
    /* Pre-app chrome — shared shape with create-team.html */
    body {
      background-image:
        radial-gradient(circle at 80% 0%, rgba(34,211,238,0.07), transparent 40%),
        radial-gradient(circle at 0% 100%, rgba(34,211,238,0.04), transparent 30%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 4px);
      min-height: 100vh;
    }
    .shell { min-height: 100vh; display: grid; grid-template-rows: auto 1fr auto; }

    .topbar {
      padding: 22px 32px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .product-brand { display: flex; align-items: center; gap: 10px; color: var(--accent); }
    .product-brand .mark {
      width: 22px; height: 22px;
      border: 2px solid currentColor;
      position: relative;
    }
    .product-brand .mark::after {
      content: '';
      position: absolute;
      top: -2px; bottom: -2px; left: 50%;
      width: 2px; background: currentColor;
      transform: translateX(-1px);
    }
    .product-brand .text {
      font-size: 13px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--text);
    }
    .product-brand .text .em { color: var(--accent); }

    .topbar .alt-action {
      font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--text-muted);
      display: flex; align-items: center; gap: 14px;
    }
    .topbar .alt-action a { color: var(--text); text-decoration: none; }
    .topbar .alt-action a:hover { color: var(--accent); }

    .pre-main { display: grid; place-items: center; padding: 48px 24px; }
    .pre-card {
      width: 100%; max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 36px 36px 28px;
      position: relative;
    }
    .pre-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px; background: var(--accent);
    }

    .kicker {
      font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    h1.head {
      font-size: 28px; font-weight: 700;
      letter-spacing: -0.4px;
      margin: 0 0 8px;
      text-transform: uppercase;
    }
    .lede {
      color: var(--text-muted);
      font-size: 13px;
      margin: 0 0 24px;
      max-width: 44ch;
    }

    /* SSO button — quiet, hairline, distinguished from primary.
       Google brand mark is the real multicolor logo so it reads as
       "Google sign-in" at a glance. */
    .sso-btn {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border-strong);
      padding: 12px 16px;
      font-family: var(--sans);
      font-weight: 600; font-size: 12px;
      letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .sso-btn:hover { background: var(--surface-2); border-color: var(--accent); }
    .sso-btn svg { display: block; }

    /* Page-local label override — match the muted treatment used for
       inline affordances (Forgot, Show/Hide) so the form reads quieter. */
    .pre-card label { color: var(--text-muted); }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 18px 0 14px;
      font-family: var(--mono); font-size: 10px;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-dim);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Password field has a reveal toggle in the trailing position. */
    .pwd-wrap { position: relative; }
    .pwd-wrap input { padding-right: 56px; }
    .pwd-reveal {
      position: absolute; top: 50%; right: 8px;
      transform: translateY(-50%);
      background: transparent; border: 0;
      color: var(--text-muted);
      font-family: var(--mono); font-size: 10px;
      letter-spacing: 1.2px; text-transform: uppercase;
      cursor: pointer; padding: 6px 8px;
    }
    .pwd-reveal:hover { color: var(--accent); }

    .field-hint-row {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 6px;
    }
    .field-hint-row label { margin-bottom: 0; }
    .field-hint-row .forgot {
      font-family: var(--mono); font-size: 10px;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
    }
    .field-hint-row .forgot:hover { color: var(--accent); }

    .submit-btn {
      width: 100%;
      margin-top: 18px;
      padding: 12px 16px;
      font-size: 12px;
    }

    /* Below-card prompt */
    .alt-prompt {
      margin-top: 18px;
      font-family: var(--mono); font-size: 11px;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
    }
    .alt-prompt a {
      color: var(--accent); text-decoration: none;
      margin-left: 6px;
    }
    .alt-prompt a:hover { text-decoration: underline; }

    .footnote {
      padding: 18px 32px;
      border-top: 1px solid var(--border);
      font-family: var(--mono); font-size: 10px;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--text-dim);
      display: flex; gap: 18px; align-items: center;
    }
    .footnote .doc { color: var(--text-muted); cursor: pointer; }
    .footnote .doc:hover { color: var(--accent); }
    .footnote .filler { flex: 1; }

    /* Form validity state — quietly disable Continue until both inputs
       have content. No real validation; we just gate the click. */
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="product-brand" href="login.html" aria-label="RaceCarHealth">
        <span class="mark" aria-hidden="true"></span>
        <span class="text">Race<span class="em">Car</span>Health</span>
      </a>
      <div class="alt-action">
        <span>New here?</span>
        <a href="register.html">Create account</a>
      </div>
    </header>

    <main class="pre-main">
      <section class="pre-card" aria-labelledby="card-h">
        <p class="kicker">Welcome back</p>
        <h1 class="head" id="card-h">Sign in</h1>
        <p class="lede">to your RaceCarHealth team.</p>

        <button type="button" class="sso-btn" id="sso-google">
          <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
            <path fill="#4285F4" d="M16.51 8.18c0-.55-.05-1.08-.14-1.59H9v3.01h4.21c-.18.97-.74 1.79-1.57 2.34v1.95h2.54c1.49-1.37 2.34-3.4 2.34-5.71z"/>
            <path fill="#34A853" d="M9 17c2.13 0 3.91-.71 5.22-1.92l-2.54-1.95c-.71.47-1.61.75-2.68.75-2.06 0-3.81-1.39-4.44-3.26H1.93v2.02C3.23 14.79 5.94 17 9 17z"/>
            <path fill="#FBBC05" d="M4.56 10.62c-.18-.47-.27-.97-.27-1.5s.09-1.03.27-1.5V5.6H1.93C1.34 6.78 1 8.1 1 9.5c0 1.4.34 2.72.93 3.9l2.63-2.02z"/>
            <path fill="#EA4335" d="M9 4.74c1.16 0 2.21.4 3.04 1.18l2.27-2.27C13.91 2.41 12.13 1.5 9 1.5 5.94 1.5 3.23 3.21 1.93 5.6l2.63 2.02C5.19 6.13 6.94 4.74 9 4.74z"/>
          </svg>
          Continue with Google
        </button>

        <div class="divider"><span>or</span></div>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="email">Email <span class="req">*</span></label>
            <input id="email" name="email" type="email" placeholder="you@team.com" autocomplete="email" required />
          </div>

          <div class="field">
            <div class="field-hint-row">
              <label for="password">Password <span class="req">*</span></label>
              <a class="forgot" href="forgot-password.html">Forgot?</a>
            </div>
            <div class="pwd-wrap">
              <input id="password" name="password" type="password" autocomplete="current-password" required />
              <button type="button" class="pwd-reveal" id="pwd-reveal" aria-label="Show password">Show</button>
            </div>
          </div>

          <button type="submit" class="btn submit-btn" id="btn-submit" disabled>Continue →</button>
        </form>

        <p class="alt-prompt">
          Don't have an account?
          <a href="register.html">Create one →</a>
        </p>
      </section>
    </main>

    <footer class="footnote">
      <span class="doc">Privacy</span>
      <span class="doc">Terms</span>
      <span class="doc">Docs</span>
      <span class="filler"></span>
      <span>RaceCarHealth · v0.1 prototype</span>
    </footer>
  </div>

  <script src="partials.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);

    const emailInput = $('email');
    const pwdInput = $('password');
    const submitBtn = $('btn-submit');

    function refreshSubmit() {
      const ok = emailInput.value.trim().length > 0 && pwdInput.value.length > 0;
      submitBtn.disabled = !ok;
    }
    emailInput.addEventListener('input', refreshSubmit);
    pwdInput.addEventListener('input', refreshSubmit);

    $('pwd-reveal').addEventListener('click', () => {
      const show = pwdInput.type === 'password';
      pwdInput.type = show ? 'text' : 'password';
      $('pwd-reveal').textContent = show ? 'Hide' : 'Show';
      $('pwd-reveal').setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    });

    $('sso-google').addEventListener('click', () => {
      RCH.toast('Continue with Google — would route to Clerk OAuth');
      setTimeout(() => { window.location.href = 'cars-list-d-final.html'; }, 900);
    });

    $('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      if (submitBtn.disabled) return;
      RCH.toast(`Would sign in ${emailInput.value.trim()}`);
      setTimeout(() => { window.location.href = 'cars-list-d-final.html'; }, 900);
    });
  </script>
</body>
</html>
