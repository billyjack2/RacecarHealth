<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Session · Bolt #88 · May 12 — Variant C (Modern SaaS)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-sub: #fafafa;
      --text: #0a0a0a;
      --text-muted: #737373;
      --text-dim: #a3a3a3;
      --border: #e5e5e5;
      --border-strong: #d4d4d4;
      --brand: #4f46e5;
      --brand-bg: #eef2ff;
      --pass: #10b981;
      --warn: #f59e0b;
      --fail: #ef4444;
      --pass-bg: #d1fae5;
      --warn-bg: #fef3c7;
      --fail-bg: #fee2e2;
      --sans: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--sans); font-size: 14px; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    .sidebar {
      background: var(--surface-sub);
      border-right: 1px solid var(--border);
      padding: 20px 14px;
      display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh;
    }
    .sidebar .brand { padding: 6px 10px 20px; color: var(--text); }
    .sidebar .brand svg { height: 26px; }
    .nav { display: flex; flex-direction: column; gap: 2px; }
    .nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px;
      font-size: 13px; font-weight: 500;
      color: var(--text-muted);
      border-radius: 6px;
    }
    .nav a .icon { display: inline-grid; place-items: center; width: 16px; height: 16px; font-size: 13px; }
    .nav a.active { color: var(--text); background: var(--surface); box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
    .nav a:hover { color: var(--text); }
    .nav-divider { height: 1px; background: var(--border); margin: 14px 4px; }
    .nav-section {
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
      color: var(--text-dim); padding: 0 10px 6px; text-transform: uppercase;
    }
    .user-foot {
      margin-top: auto; padding: 12px 8px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .avatar {
      width: 28px; height: 28px; border-radius: 6px;
      background: var(--brand); color: white;
      display: grid; place-items: center;
      font-size: 11px; font-weight: 600;
    }
    .user-foot .who { font-size: 12px; }
    .user-foot .role { color: var(--text-muted); font-size: 11px; }

    .main { padding: 32px 40px 64px; max-width: 1100px; }

    .crumbs { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }
    .crumbs a { color: var(--text-muted); }
    .crumbs .sep { color: var(--text-dim); margin: 0 6px; }
    .crumbs .here { color: var(--text); }

    /* Title row */
    .title-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 24px; margin-bottom: 28px;
    }
    .title-row h1 {
      font-size: 24px; font-weight: 600;
      letter-spacing: -0.4px;
      margin: 0 0 6px;
    }
    .title-row .sub {
      font-size: 14px; color: var(--text-muted);
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .title-row .sub span { display: inline-flex; align-items: center; gap: 6px; }
    .title-row .actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border);
      padding: 7px 13px;
      font-family: var(--sans); font-size: 13px; font-weight: 500;
      border-radius: 6px; cursor: pointer;
    }
    .btn.primary { background: var(--text); color: white; border-color: var(--text); }

    .verdict-big {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600;
      padding: 4px 10px; border-radius: 6px;
      margin-left: 12px;
    }
    .verdict-big::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .verdict-big.fail { color: var(--fail); background: var(--fail-bg); }
    .verdict-big.warn { color: var(--warn); background: var(--warn-bg); }
    .verdict-big.pass { color: var(--pass); background: var(--pass-bg); }

    /* Stats grid */
    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 12px; margin-bottom: 32px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .stat-lbl { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .stat-val { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; line-height: 1.2; }
    .stat-val.pass { color: var(--pass); }
    .stat-val.warn { color: var(--warn); }
    .stat-val.fail { color: var(--fail); }

    /* Section */
    .section-h {
      display: flex; align-items: baseline; justify-content: space-between;
      margin: 8px 0 14px;
    }
    .section-h h2 {
      font-size: 14px; font-weight: 600;
      margin: 0;
    }
    .section-h .help { font-size: 12px; color: var(--text-muted); }

    /* Files */
    .files {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-bottom: 32px;
    }
    .file {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      position: relative;
    }
    .file-name { font-weight: 500; font-size: 13px; }
    .file-meta { font-family: var(--mono); font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .file .pill-status {
      position: absolute; top: 12px; right: 12px;
      font-size: 11px; font-weight: 500;
      padding: 2px 8px; border-radius: 4px;
    }
    .file .pill-status.pass { color: var(--pass); background: var(--pass-bg); }
    .file .pill-status.warn { color: var(--warn); background: var(--warn-bg); }
    .file .pill-status.fail { color: var(--fail); background: var(--fail-bg); }

    /* Check groups as a single card with sections */
    .checks-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .group-head {
      background: var(--surface-sub);
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .group-head h3 {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--text-muted);
      margin: 0;
    }
    .group-head .count {
      font-size: 12px; color: var(--text-dim);
      font-family: var(--mono);
    }

    .check {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      column-gap: 24px;
      row-gap: 12px;
    }
    .check:last-child { border-bottom: 0; }
    .check-info { min-width: 0; }
    .check-name {
      font-size: 14px; font-weight: 500;
      display: flex; align-items: center; gap: 10px;
    }
    .check-threshold {
      font-family: var(--mono); font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .rollup {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.4px;
    }
    .rollup::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .rollup.pass { color: var(--pass); background: var(--pass-bg); }
    .rollup.warn { color: var(--warn); background: var(--warn-bg); }
    .rollup.fail { color: var(--fail); background: var(--fail-bg); }

    /* Per-file mini-table */
    .per-file {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface-sub);
    }
    .pf {
      padding: 10px 14px;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 4px;
    }
    .pf:last-child { border-right: 0; }
    .pf-head { display: flex; align-items: center; justify-content: space-between; }
    .pf-name { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
    .pf-mini {
      font-size: 10px; font-weight: 600;
      padding: 1px 6px; border-radius: 3px;
      text-transform: uppercase; letter-spacing: 0.4px;
    }
    .pf-mini.pass { color: var(--pass); background: var(--pass-bg); }
    .pf-mini.warn { color: var(--warn); background: var(--warn-bg); }
    .pf-mini.fail { color: var(--fail); background: var(--fail-bg); }
    .pf-val { font-family: var(--mono); font-size: 13px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <a href="cars-list-c.html" class="brand">
        <svg viewBox="0 0 260 48" aria-hidden="true">
          <g fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round">
            <rect x="3" y="14" width="22" height="20" rx="10"/>
            <rect x="17" y="14" width="22" height="20" rx="10"/>
          </g>
          <text x="50" y="31" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="2" fill="currentColor">CROSSLINK</text>
          <text x="50" y="44" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" letter-spacing="3" fill="currentColor" opacity="0.6">MOTORSPORTS</text>
        </svg>
      </a>
      <nav class="nav">
        <a href="#"><span class="icon">⌂</span> Home</a>
        <a href="cars-list-c.html"><span class="icon">⚙</span> Cars</a>
        <a href="#" class="active"><span class="icon">↧</span> Sessions</a>
        <a href="#"><span class="icon">≡</span> Reports</a>
      </nav>
      <div class="nav-divider"></div>
      <div class="nav-section">Configure</div>
      <nav class="nav">
        <a href="#"><span class="icon">∷</span> Check library</a>
        <a href="#"><span class="icon">⌥</span> Channel mapping</a>
        <a href="#"><span class="icon">◐</span> Settings</a>
      </nav>
      <div class="user-foot">
        <span class="avatar" id="user-init"></span>
        <div>
          <div class="who" id="user-name"></div>
          <div class="role" id="user-role"></div>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="crumbs">
        <a href="cars-list-c.html">Cars</a>
        <span class="sep">/</span>
        <a href="#">Bolt #88</a>
        <span class="sep">/</span>
        <span class="here" id="crumb-session"></span>
      </div>

      <div class="title-row">
        <div>
          <h1>
            <span id="title-text"></span>
            <span class="verdict-big" id="title-verdict">Fail</span>
          </h1>
          <div class="sub">
            <span id="sub-track"></span>
            <span>·</span>
            <span id="sub-driver"></span>
            <span>·</span>
            <span id="sub-date"></span>
          </div>
        </div>
        <div class="actions">
          <button class="btn">Re-bucket</button>
          <button class="btn">Export PDF</button>
          <button class="btn primary">Share</button>
        </div>
      </div>

      <section class="stats">
        <div class="stat">
          <div class="stat-lbl">Duration</div>
          <div class="stat-val" id="s-duration"></div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Files</div>
          <div class="stat-val" id="s-files"></div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Checks run</div>
          <div class="stat-val" id="s-checks"></div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Concerns</div>
          <div class="stat-val fail" id="s-fails"></div>
        </div>
      </section>

      <div class="section-h">
        <h2>Files</h2>
        <span class="help">3 stints bucketed automatically</span>
      </div>
      <div class="files" id="files"></div>

      <div class="section-h">
        <h2>Health checks</h2>
        <span class="help">Worst-of rollup, per-file detail inline</span>
      </div>
      <div class="checks-card" id="groups"></div>
    </main>
  </div>

  <script src="fixtures/data.js"></script>
  <script>
    const d = window.CROSSLINK;
    const s = d.session;
    document.getElementById('user-name').textContent = d.user.name;
    document.getElementById('user-init').textContent = d.user.initials;
    document.getElementById('user-role').textContent = d.user.role;

    const fmtShort = (str) => new Date(str).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

    document.getElementById('crumb-session').textContent = `Session ${fmtShort(s.date)}`;
    document.getElementById('title-text').textContent = `${s.car.name} #${s.car.number}`;
    document.getElementById('title-verdict').textContent = s.rollupVerdict;
    document.getElementById('title-verdict').classList.add(s.rollupVerdict);
    document.getElementById('sub-track').textContent = s.track;
    document.getElementById('sub-driver').textContent = `${s.car.driver}, ${s.car.carType}`;
    document.getElementById('sub-date').textContent = fmtShort(s.date);

    document.getElementById('s-duration').textContent = s.duration;
    document.getElementById('s-files').textContent = s.files.length;
    document.getElementById('s-checks').textContent = s.summary.checksRun;
    document.getElementById('s-fails').textContent = s.summary.fails;

    document.getElementById('files').innerHTML = s.files.map(f => `
      <div class="file">
        <span class="pill-status ${f.verdict}">${f.verdict}</span>
        <div class="file-name">${f.name}</div>
        <div class="file-meta">${f.start} · ${f.duration} · ${f.samples}</div>
      </div>
    `).join('');

    document.getElementById('groups').innerHTML = s.checkGroups.map(g => `
      <section>
        <header class="group-head">
          <h3>${g.name}</h3>
          <span class="count">${g.checks.length}</span>
        </header>
        ${g.checks.map(c => `
          <div class="check">
            <div class="check-info">
              <div class="check-name">
                ${c.name}
                <span class="rollup ${c.rollup}">${c.rollup}</span>
              </div>
              <div class="check-threshold">${c.threshold}</div>
            </div>
            <div></div>
            <div class="per-file">
              ${s.files.map(f => {
                const pf = c.perFile[f.id];
                return `<div class="pf">
                  <div class="pf-head">
                    <span class="pf-name">${f.name.split('-')[0]}</span>
                    <span class="pf-mini ${pf.verdict}">${pf.verdict}</span>
                  </div>
                  <span class="pf-val">${pf.observed}</span>
                </div>`;
              }).join('')}
            </div>
          </div>
        `).join('')}
      </section>
    `).join('');
  </script>
</body>
</html>
