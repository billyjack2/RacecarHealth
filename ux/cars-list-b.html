<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cars · Crosslink Motorsports — Variant B (Clinical)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fafaf7;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --text-dim: #9a9a9a;
      --border: #ece8dd;
      --border-subtle: #f3efe5;
      --accent: #4a5d4f;
      --pass: #15803d;
      --warn: #b45309;
      --fail: #b91c1c;
      --pass-bg: #ecfdf5;
      --warn-bg: #fef3c7;
      --fail-bg: #fee2e2;
      --serif: 'Source Serif 4', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
      --mono: 'IBM Plex Mono', ui-monospace, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    /* Top bar */
    .topbar {
      display: flex; align-items: center; gap: 40px;
      padding: 18px 40px;
      background: var(--surface);
      border-bottom: 1px solid var(--border-subtle);
    }
    .brand { display: flex; align-items: center; color: var(--accent); }
    .brand svg { height: 26px; width: auto; }
    .nav { display: flex; gap: 28px; margin-left: 8px; }
    .nav a {
      font-size: 14px; font-weight: 500;
      color: var(--text-muted);
      padding: 6px 0;
      border-bottom: 2px solid transparent;
    }
    .nav a.active { color: var(--text); border-bottom-color: var(--accent); }
    .nav a:hover { color: var(--text); }
    .right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
    .userchip {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--text-muted);
    }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); color: white;
      display: grid; place-items: center;
      font-size: 12px; font-weight: 600;
    }

    /* Page */
    .container { max-width: 1200px; margin: 0 auto; padding: 48px 40px 80px; }
    .page-head {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 40px;
    }
    .page-head h1 {
      font-family: var(--serif);
      font-weight: 300;
      font-size: 48px;
      letter-spacing: -1px;
      margin: 0 0 8px;
    }
    .page-head .sub {
      font-size: 15px; color: var(--text-muted);
    }
    .btn {
      background: var(--accent); color: white;
      border: 0; padding: 12px 22px;
      font-family: var(--sans);
      font-size: 14px; font-weight: 500;
      border-radius: 6px; cursor: pointer;
    }
    .btn-ghost {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border);
    }

    /* Stats — three numbers, generous */
    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 24px; margin-bottom: 32px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 24px 28px;
    }
    .stat-lbl {
      font-size: 12px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1.5px;
      margin-bottom: 12px;
    }
    .stat-val {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 40px;
      letter-spacing: -1px;
      line-height: 1;
    }
    .stat-sub { font-size: 13px; color: var(--text-muted); margin-top: 8px; }

    /* Filters */
    .filters {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 24px;
    }
    .pill {
      font-size: 13px;
      padding: 7px 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 999px;
      color: var(--text-muted);
      cursor: pointer;
    }
    .pill.active {
      color: var(--text); border-color: var(--accent);
      background: rgba(74,93,79,0.06);
    }
    .search {
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 16px; font-size: 13px;
      width: 280px;
    }

    /* Card grid */
    .cars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 24px;
      transition: box-shadow 0.15s, transform 0.15s;
      cursor: pointer;
      position: relative;
    }
    .card:hover {
      box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 32px -12px rgba(0,0,0,0.12);
      transform: translateY(-1px);
    }
    .card-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 20px;
    }
    .car-num {
      font-family: var(--serif);
      font-weight: 300;
      font-size: 56px;
      letter-spacing: -2px;
      line-height: 0.9;
      color: var(--accent);
    }
    .verdict {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 500;
      padding: 5px 12px; border-radius: 999px;
    }
    .verdict::before {
      content: ''; width: 7px; height: 7px; border-radius: 50%;
      background: currentColor;
    }
    .verdict.pass { color: var(--pass); background: var(--pass-bg); }
    .verdict.warn { color: var(--warn); background: var(--warn-bg); }
    .verdict.fail { color: var(--fail); background: var(--fail-bg); }

    .car-name { font-family: var(--serif); font-size: 24px; font-weight: 400; margin: 0 0 4px; }
    .car-type { font-size: 13px; color: var(--text-muted); }
    .car-driver { font-size: 13px; color: var(--text-muted); margin-top: 6px; }

    .divider {
      height: 1px; background: var(--border-subtle);
      margin: 18px 0;
    }
    .last {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 13px;
    }
    .last-track { color: var(--text); }
    .last-date { color: var(--text-muted); font-family: var(--mono); font-size: 12px; }

    .trend-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 16px;
    }
    .trend-lbl { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; }
    .trend { display: flex; gap: 4px; }
    .trend .dot { width: 8px; height: 8px; border-radius: 50%; }
    .trend .dot.pass { background: var(--pass); opacity: 0.7; }
    .trend .dot.warn { background: var(--warn); opacity: 0.85; }
    .trend .dot.fail { background: var(--fail); }
  </style>
</head>
<body>
  <header class="topbar">
    <a href="#" class="brand">
      <svg viewBox="0 0 260 48" aria-hidden="true">
        <g fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round">
          <rect x="3" y="14" width="22" height="20" rx="10"/>
          <rect x="17" y="14" width="22" height="20" rx="10"/>
        </g>
        <text x="50" y="31" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="2" fill="currentColor">CROSSLINK</text>
        <text x="50" y="44" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" letter-spacing="3" fill="currentColor" opacity="0.6">MOTORSPORTS</text>
      </svg>
    </a>
    <nav class="nav">
      <a href="#" class="active">Cars</a>
      <a href="#">Sessions</a>
      <a href="#">Checks</a>
      <a href="#">Settings</a>
    </nav>
    <div class="right">
      <div class="userchip">
        <span id="user-name"></span>
        <span class="avatar" id="user-init"></span>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="page-head">
      <div>
        <h1>Cars</h1>
        <div class="sub" id="page-sub"></div>
      </div>
      <button class="btn">+ Add car</button>
    </div>

    <section class="stats">
      <div class="stat">
        <div class="stat-lbl">Active fleet</div>
        <div class="stat-val" id="stat-cars"></div>
        <div class="stat-sub">3 car types in service</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">Sessions this week</div>
        <div class="stat-val" id="stat-sessions"></div>
        <div class="stat-sub">+3 vs the prior week</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">Open concerns</div>
        <div class="stat-val" id="stat-fails" style="color: var(--fail);"></div>
        <div class="stat-sub">Bolt #88 — Road Atlanta, May 12</div>
      </div>
    </section>

    <div class="filters">
      <span class="pill active">All</span>
      <span class="pill">Spec Miata</span>
      <span class="pill">Radical SR3</span>
      <span class="pill">LMP3</span>
      <span class="pill">GT4 Cayman</span>
      <input class="search" placeholder="Search cars, drivers, tracks…" />
    </div>

    <div class="cars" id="cars-grid"></div>
  </main>

  <script src="fixtures/data.js"></script>
  <script>
    const data = window.CROSSLINK;
    document.getElementById('user-name').textContent = data.user.name;
    document.getElementById('user-init').textContent = data.user.initials;
    document.getElementById('page-sub').textContent =
      `${data.team.activeCars} cars across 3 types · ${data.team.sessionsThisWeek} sessions this week`;
    document.getElementById('stat-cars').textContent = data.team.activeCars;
    document.getElementById('stat-sessions').textContent = data.team.sessionsThisWeek;
    document.getElementById('stat-fails').textContent = data.team.failuresThisWeek;

    const fmtDate = (s) => new Date(s).toLocaleDateString('en-US', { month: 'short', day: '2-digit' });

    document.getElementById('cars-grid').innerHTML = data.cars.map(c => `
      <article class="card">
        <header class="card-head">
          <div class="car-num">${c.number}</div>
          <span class="verdict ${c.lastVerdict}">${c.lastVerdict}</span>
        </header>
        <h3 class="car-name">${c.name}</h3>
        <div class="car-type">${c.carType}</div>
        <div class="car-driver">${c.driver} · ${c.sessionsCount} sessions logged</div>
        <div class="divider"></div>
        <div class="last">
          <div class="last-track">${c.lastSessionTrack}</div>
          <div class="last-date">${fmtDate(c.lastSessionAt)}</div>
        </div>
        <div class="trend-row">
          <span class="trend-lbl">Recent sessions</span>
          <div class="trend">
            ${c.trend.map(v => `<span class="dot ${v}"></span>`).join('')}
          </div>
        </div>
      </article>
    `).join('');
  </script>
</body>
</html>
