<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cars · Crosslink Motorsports — Variant C (Modern SaaS)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-sub: #fafafa;
      --text: #0a0a0a;
      --text-muted: #737373;
      --text-dim: #a3a3a3;
      --border: #e5e5e5;
      --border-strong: #d4d4d4;
      --brand: #4f46e5;
      --brand-bg: #eef2ff;
      --pass: #10b981;
      --warn: #f59e0b;
      --fail: #ef4444;
      --pass-bg: #d1fae5;
      --warn-bg: #fef3c7;
      --fail-bg: #fee2e2;
      --sans: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    /* Layout: sidebar + main */
    .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    .sidebar {
      background: var(--surface-sub);
      border-right: 1px solid var(--border);
      padding: 20px 14px;
      display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh;
    }
    .sidebar .brand {
      padding: 6px 10px 20px;
      color: var(--text);
    }
    .sidebar .brand svg { height: 26px; }
    .nav { display: flex; flex-direction: column; gap: 2px; }
    .nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px;
      font-size: 13px; font-weight: 500;
      color: var(--text-muted);
      border-radius: 6px;
    }
    .nav a .icon {
      display: inline-grid; place-items: center;
      width: 16px; height: 16px; font-size: 13px;
    }
    .nav a.active { color: var(--text); background: var(--surface); box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
    .nav a:hover { color: var(--text); }
    .nav-divider {
      height: 1px; background: var(--border);
      margin: 14px 4px;
    }
    .nav-section {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      padding: 0 10px 6px;
      text-transform: uppercase;
    }
    .user-foot {
      margin-top: auto;
      padding: 12px 8px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .avatar {
      width: 28px; height: 28px; border-radius: 6px;
      background: var(--brand); color: white;
      display: grid; place-items: center;
      font-size: 11px; font-weight: 600;
    }
    .user-foot .who {
      font-size: 12px;
    }
    .user-foot .role { color: var(--text-muted); font-size: 11px; }

    .main { padding: 32px 40px 64px; max-width: 1100px; }

    .page-head {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 6px;
    }
    .page-head h1 {
      font-size: 24px; font-weight: 600;
      letter-spacing: -0.4px;
      margin: 0;
    }
    .page-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }

    .btn {
      background: var(--text); color: white;
      border: 0; padding: 7px 14px;
      font-family: var(--sans);
      font-size: 13px; font-weight: 500;
      border-radius: 6px; cursor: pointer;
    }
    .btn-ghost {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border);
    }

    /* Stat row */
    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 12px; margin-bottom: 28px;
    }
    .stat {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      background: var(--surface);
    }
    .stat-lbl {
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 6px;
    }
    .stat-val {
      font-size: 24px; font-weight: 600;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }
    .stat-val.fail { color: var(--fail); }
    .stat-delta {
      display: inline-block; margin-left: 8px;
      font-size: 12px; font-weight: 500;
    }
    .stat-delta.up { color: var(--pass); }
    .stat-delta.down { color: var(--fail); }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px;
    }
    .search {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 13px;
      width: 280px;
    }
    .pill {
      font-size: 12px; font-weight: 500;
      padding: 5px 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
    }
    .pill.active { color: var(--text); background: var(--surface-sub); border-color: var(--border-strong); }

    /* Table */
    table.cars {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
    }
    table.cars thead th {
      text-align: left;
      font-size: 12px; font-weight: 500;
      color: var(--text-muted);
      padding: 10px 14px;
      background: var(--surface-sub);
      border-bottom: 1px solid var(--border);
    }
    table.cars tbody td {
      padding: 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    table.cars tbody tr:hover { background: var(--surface-sub); cursor: pointer; }
    table.cars tbody tr:last-child td { border-bottom: 0; }

    .car-num { font-family: var(--mono); font-size: 13px; color: var(--text-muted); width: 50px; }
    .car-name { font-weight: 600; }
    .car-sub { font-size: 12px; color: var(--text-muted); }
    .car-type { font-size: 13px; color: var(--text-muted); }
    .last-cell { font-size: 13px; }
    .last-sub { font-size: 12px; color: var(--text-muted); }

    .verdict {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 500;
      padding: 3px 10px; border-radius: 999px;
    }
    .verdict::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .verdict.pass { color: var(--pass); background: var(--pass-bg); }
    .verdict.warn { color: var(--warn); background: var(--warn-bg); }
    .verdict.fail { color: var(--fail); background: var(--fail-bg); }

    .trend {
      display: inline-flex; gap: 3px; align-items: flex-end; height: 18px;
    }
    .trend .bar { width: 5px; border-radius: 1px; }
    .trend .bar.pass { background: var(--pass); height: 10px; }
    .trend .bar.warn { background: var(--warn); height: 14px; }
    .trend .bar.fail { background: var(--fail); height: 18px; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <a href="#" class="brand">
        <svg viewBox="0 0 260 48" aria-hidden="true">
          <g fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round">
            <rect x="3" y="14" width="22" height="20" rx="10"/>
            <rect x="17" y="14" width="22" height="20" rx="10"/>
          </g>
          <text x="50" y="31" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="2" fill="currentColor">CROSSLINK</text>
          <text x="50" y="44" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" letter-spacing="3" fill="currentColor" opacity="0.6">MOTORSPORTS</text>
        </svg>
      </a>
      <nav class="nav">
        <a href="#"><span class="icon">⌂</span> Home</a>
        <a href="#" class="active"><span class="icon">⚙</span> Cars</a>
        <a href="#"><span class="icon">↧</span> Sessions</a>
        <a href="#"><span class="icon">≡</span> Reports</a>
      </nav>
      <div class="nav-divider"></div>
      <div class="nav-section">Configure</div>
      <nav class="nav">
        <a href="#"><span class="icon">∷</span> Check library</a>
        <a href="#"><span class="icon">⌥</span> Channel mapping</a>
        <a href="#"><span class="icon">◐</span> Settings</a>
      </nav>
      <div class="user-foot">
        <span class="avatar" id="user-init"></span>
        <div>
          <div class="who" id="user-name"></div>
          <div class="role" id="user-role"></div>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="page-head">
        <div>
          <h1>Cars</h1>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-ghost">Import CSV</button>
          <button class="btn">+ Add car</button>
        </div>
      </div>
      <div class="page-sub" id="page-sub"></div>

      <section class="stats">
        <div class="stat">
          <div class="stat-lbl">Active cars</div>
          <div class="stat-val" id="stat-cars"></div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Sessions / 7d</div>
          <div class="stat-val">
            <span id="stat-sessions"></span>
            <span class="stat-delta up">+33%</span>
          </div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Failures / 7d</div>
          <div class="stat-val fail" id="stat-fails"></div>
        </div>
        <div class="stat">
          <div class="stat-lbl">Members</div>
          <div class="stat-val" id="stat-members"></div>
        </div>
      </section>

      <div class="toolbar">
        <input class="search" placeholder="Search cars, drivers, tracks…" />
        <span class="pill active">All types</span>
        <span class="pill">Spec Miata</span>
        <span class="pill">Radical SR3</span>
        <span class="pill">LMP3</span>
        <span class="pill">GT4 Cayman</span>
      </div>

      <table class="cars">
        <thead>
          <tr>
            <th>#</th>
            <th>Car</th>
            <th>Type</th>
            <th>Last session</th>
            <th>Status</th>
            <th>Last 7</th>
            <th style="text-align:right;">Sessions</th>
          </tr>
        </thead>
        <tbody id="cars-body"></tbody>
      </table>
    </main>
  </div>

  <script src="fixtures/data.js"></script>
  <script>
    const data = window.CROSSLINK;
    document.getElementById('user-name').textContent = data.user.name;
    document.getElementById('user-init').textContent = data.user.initials;
    document.getElementById('user-role').textContent = data.user.role;
    document.getElementById('page-sub').textContent =
      `${data.team.activeCars} cars · ${data.team.sessionsThisWeek} sessions this week · ${data.team.failuresThisWeek} failure`;
    document.getElementById('stat-cars').textContent = data.team.activeCars;
    document.getElementById('stat-sessions').textContent = data.team.sessionsThisWeek;
    document.getElementById('stat-fails').textContent = data.team.failuresThisWeek;
    document.getElementById('stat-members').textContent = data.team.membersCount;

    const fmtDate = (s) => new Date(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

    document.getElementById('cars-body').innerHTML = data.cars.map(c => `
      <tr>
        <td class="car-num">${c.number}</td>
        <td>
          <div class="car-name">${c.name}</div>
          <div class="car-sub">${c.driver}</div>
        </td>
        <td class="car-type">${c.carType}</td>
        <td>
          <div class="last-cell">${c.lastSessionTrack}</div>
          <div class="last-sub">${fmtDate(c.lastSessionAt)}</div>
        </td>
        <td><span class="verdict ${c.lastVerdict}">${c.lastVerdict}</span></td>
        <td>
          <div class="trend">
            ${c.trend.map(v => `<span class="bar ${v}"></span>`).join('')}
          </div>
        </td>
        <td style="text-align:right; font-family: var(--mono); font-size: 13px; color: var(--text-muted);">${c.sessionsCount}</td>
      </tr>
    `).join('');
  </script>
</body>
</html>
